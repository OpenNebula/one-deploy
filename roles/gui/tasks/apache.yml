---
- tags: [preinstall]
  block:
    - name: Install Apache2
      ansible.builtin.package:
        name: "{{ _common + _specific[ansible_os_family] }}"
      vars:
        _common: []
        _specific:
          Debian: [apache2]
          RedHat: [httpd, mod_ssl]
          Suse: [apache2]
      register: package
      until: package is success
      retries: 12
      delay: 5

    # NOTE: All modules specified below are not enabled automatically
    #       in Debian-like and Suse-like distros.
    - name: Manage Apache2 modules
      ansible.builtin.shell:
        cmd: "{{ _shell[ansible_os_family].cmd }}"
        executable: /bin/bash
      when:
        - ansible_os_family in _mods
        - ansible_os_family in _shell
      vars:
        _mods:
          Debian: [headers, proxy, proxy_http, proxy_wstunnel, rewrite, ssl]
          Suse: [access_compat, headers, proxy, proxy_http, proxy_wstunnel, rewrite, ssl]
        _shell:
          Debian:
            cmd: |
              set -o errexit -o pipefail
              BEFORE="$(a2query -m | sort | cksum)"
              {% for v in _mods.Debian %}
              a2enmod '{{ v }}'
              {% endfor %}
              AFTER="$(a2query -m | sort | cksum)"
              if [[ "$AFTER" == "$BEFORE" ]]; then
                exit 0
              else
                exit 78 # EREMCHG
              fi
          Suse:
            cmd: |
              set -o errexit -o pipefail
              BEFORE="$(a2enmod -l | sort | cksum)"
              {% for v in _mods.Suse %}
              a2enmod '{{ v }}'
              {% endfor %}
              a2enflag SSL
              AFTER="$(a2enmod -l | sort | cksum)"
              if [[ "$AFTER" == "$BEFORE" ]]; then
                exit 0
              else
                exit 78 # EREMCHG
              fi
      register: shell
      changed_when:
        - shell.rc in [78]
      failed_when:
        - shell.rc not in [0, 78]
      notify:
        - Reload Apache2

- vars:
    _destdir:
      Debian: /etc/apache2/sites-available
      RedHat: /etc/httpd/conf.d
      Suse: /etc/apache2/conf.d
    _template: reverse_proxy_ssl_apache2.conf.j2
    _loop:
      - name: opennebula-ssl
        when: >-
          {{ (ssl.key is defined and ssl.key is truthy)
             and
             (ssl.certchain is defined and ssl.certchain is truthy) }}
  block:
    - name: Configure OpenNebula VHOSTs (Apache2)
      ansible.builtin.template:
        dest: "{{ _destdir[ansible_os_family] }}/{{ item.name }}.conf"
        src: "{{ role_path }}/templates/{{ _template }}"
        mode: u=rw,go=r
      when:
        - item.when is true
      loop: "{{ _loop }}"
      notify:
        - Reload Apache2

    - name: Enable OpenNebula VHOSTs (Apache2)
      ansible.builtin.command:
        cmd: a2ensite '{{ item.name }}'
        creates: "/etc/apache2/sites-enabled/{{ item.name }}.conf"
      when:
        - item.when is true
        - ansible_os_family == 'Debian'
      loop: "{{ _loop }}"
      notify:
        - Reload Apache2

    - name: Enable/Start Apache2 Server
      ansible.builtin.service:
        name: "{{ _name[ansible_os_family] }}"
        enabled: true
        state: started
      vars:
        _name: { Debian: apache2, RedHat: httpd, Suse: apache2 }
