---
features_defaults:
  prometheus: false
  ceph: false
  evpn: false

ceph_defaults:
  pool: one
  user: libvirt
  host: >-
    {{ groups[mon_group | d('mon')] | map('extract', hostvars, ['ansible_host']) | join(' ')
       if groups[mon_group | d('mon')] is defined else
       [] }}
  uuid: null
  repo: community
  release: tentacle
