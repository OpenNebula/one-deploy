---
- when: one_version is version('7.2.1', '>=')
  block:
    - name: Create hooks for backup/restore metrics
      ansible.builtin.shell:
        cmd: |
          set +o errexit
          TEMPLATE="$(mktemp)"
          tee "$TEMPLATE"
          onehook show '{{ item.template.NAME }}'; RC="$?"
          if (( RC != 0 )); then
            onehook create "$TEMPLATE"; RC="$?"
            if (( RC == 0 )); then
              RC=78 # EREMCHG
            fi
          fi
          rm -f "$TEMPLATE"
          exit "$RC"
        stdin: |
          {{ item.template | opennebula.deploy.to_one }}
        executable: /bin/bash
      register: shell
      changed_when:
        - shell.rc in [78]
      failed_when:
        - shell.rc not in [0, 78]
      loop:
        - template:
            NAME: "hook-add-backup-metrics"
            TYPE: "api"
            ARGUMENTS: "$API backup"
            ARGUMENTS_STDIN: "YES"
            CALL: "one.vm.backup"
            COMMAND: >-
              /bin/env GEM_HOME=/usr/share/one/gems/
              ruby -I/usr/lib/one/ruby/ /var/lib/one/remotes/hooks/metrics/backup_restore_metrics.rb
            REMOTE: "NO"
        - template:
            NAME: "hook-add-restore-metrics"
            TYPE: "api"
            ARGUMENTS: "$API restore"
            ARGUMENTS_STDIN: "YES"
            CALL: "one.vm.restore"
            COMMAND: >-
              /bin/env GEM_HOME=/usr/share/one/gems/
              ruby -I/usr/lib/one/ruby/ /var/lib/one/remotes/hooks/metrics/backup_restore_metrics.rb
            REMOTE: "NO"

- name: Configure Alertmanager
  ansible.builtin.copy:
    dest: /etc/one/alertmanager/alertmanager.yml
    owner: 0
    group: 0
    mode: u=rw,go=r
    content: "{{ alertmanager_config }}"
  register: copy_alertmanager_yml

- vars:
    _peers: >-
      {{ ansible_play_hosts_all | reject('in', [inventory_hostname])
                                | map('regex_replace', '^(.*)$', ' --cluster.peer=\g<1>:9094 ')
                                | join }}
    _loop:
      - name: opennebula-alertmanager.service
        dest: /etc/systemd/system/opennebula-alertmanager.service.d/override.conf
        src: "{{ role_path }}/../common/templates/opennebula-alertmanager.service.jinja"
  block:
    - name: Override systemd units (mkdir)
      ansible.builtin.file:
        path: "{{ item.dest | dirname }}"
        state: directory
        owner: 0
        group: 0
        mode: u=rwx,go=rx
      loop: "{{ _loop }}"

    - name: Override systemd units
      ansible.builtin.template:
        dest: "{{ item.dest }}"
        src: "{{ item.src }}"
        owner: 0
        group: 0
        mode: u=rw,go=r
      loop: "{{ _loop }}"
      register: template_override_units

    - name: Enable / Start / Restart Alertmanager service (NOW)
      ansible.builtin.systemd_service:
        name: "{{ item.name }}"
        enabled: true
        state: >-
          {{ 'restarted' if _changed else 'started' }}
        daemon_reload: >-
          {{ _changed }}
      loop: "{{ _loop }}"
      vars:
        _changed: >-
          {{ copy_alertmanager_yml is changed or template_override_units is changed }}
