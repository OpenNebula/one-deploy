---
all:
  vars:
    ansible_user: ubuntu
    ensure_keys_for: [ubuntu, root]
    one_pass: opennebulapass
    one_version: '7.2'
    features:
      # Enable the "ceph" feature in one-deploy.
      ceph: true
    ds:
      # Simple datastore setup - use built-in Ceph cluster for datastores 0 (system) and 1 (images).
      mode: ceph
    vn:
      admin_net:
        managed: true
        template:
          VN_MAD: bridge
          PHYDEV: eth0
          BRIDGE: br0
          AR:
            TYPE: IP4
            IP: 172.20.0.200
            SIZE: 48
          NETWORK_ADDRESS: 172.20.0.0
          NETWORK_MASK: 255.255.255.0
          GATEWAY: 172.20.0.1
          DNS: 172.20.0.1

frontend:
  hosts:
    f1: { ansible_host: 172.20.0.6 }

node:
  hosts:
    n1: { ansible_host: 172.20.0.7 }
    n2: { ansible_host: 172.20.0.8 }
    n3: { ansible_host: 172.20.0.9 }

ceph:
  children:
    ? mon
    ? mgr
    ? osd
  vars:
    osd_memory_target: '4294967296' # dummy variable
    cephadm_spec_osd_defaults: |
      ---
      service_type: osd
      service_id: all-available-devices
      service_name: osd.all-available-devices
      placement:
        label: osd
      extra_container_args:
        - '--cpus 2'
        - '--memory-reservation {{ (0.75 * osd_memory_target) | int }}'
        - '--memory {{ osd_memory_target | int }}'
      spec:
        data_devices:
          all: true
        filter_logic: AND
        objectstore: bluestore
mon:
  hosts:
    f1: { ansible_host: 172.20.0.6 }

mgr:
  hosts:
    f1: { ansible_host: 172.20.0.6 }

osd:
  vars:
    cephadm_conf:
      osd_memory_target_autotune: 'false'
      osd_memory_target: "{{ osd_memory_target }}"
  hosts:
    # NOTE: The Ceph osds are deployed along the OpenNebula KVM nodes (HCI setup).
    n1:
      ansible_host: 172.20.0.7
      cephadm_conf:
        osd_memory_target: null
    n2:
      ansible_host: 172.20.0.8
      cephadm_conf:
        osd_memory_target: null
    n3:
      ansible_host: 172.20.0.9
      cephadm_conf:
        osd_memory_target: null
